name: Desktop release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set shell version from tag
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        working-directory: desktop
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/desktop-v',''
          npm version $version --no-git-tag-version --allow-same-version

      - name: Install and build NSIS installer
        working-directory: desktop
        shell: pwsh
        run: |
          npm install
          npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build output
        working-directory: desktop
        shell: pwsh
        run: Get-ChildItem -Recurse dist

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/*.exe
            desktop/dist/latest.yml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Skyledger-setup-win
          path: |
            desktop/dist/*.exe
            desktop/dist/latest.yml
