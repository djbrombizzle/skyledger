<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/SCSS/common.css" />
    <link rel="stylesheet" href="CustomPanel.css" />

    <script type="text/javascript" src="/JS/coherent.js"></script>
    <script type="text/javascript" src="/JS/common.js"></script>
    <script type="text/javascript" src="/JS/dataStorage.js"></script>
    <script type="text/javascript" src="/JS/buttons.js"></script>
    <script type="text/javascript" src="/JS/Services/ToolBarPanels.js"></script>
    <script type="text/javascript" src="/Pages/VCockpit/Instruments/Shared/BaseInstrument.js"></script>

    <link rel="import" href="/templates/ingameUi/ingameUi.html" />
    <link rel="import" href="/templates/ingameUiHeader/ingameUiHeader.html" />

    <script type="text/javascript" src="CustomPanel.js"></script>
</head>

<body class="border-box">
    <ingamepanel-custom>
        <ingame-ui id="CustomPanel" panel-id="PANEL_CUSTOM_PANEL" title="SKYLEDGER PIREP" element-id="CustomPanel" content-fit="true" min-width="240" min-height="300">
            <div id="sky-root">
                <div class="sky-hd">SKYLEDGER · PIREP</div>
                <div class="sky-staterow"><span id="sky-state" class="sky-state">— IDLE</span></div>

                <div class="sky-grid">
                    <div class="cell"><div class="k">PHASE</div><div id="sky-phase" class="v">—</div></div>
                    <div class="cell"><div class="k">GND SPD</div><div id="sky-gs" class="v">0 kt</div></div>
                    <div class="cell"><div class="k">ALT</div><div id="sky-alt" class="v">0 ft</div></div>
                    <div class="cell"><div class="k">V/S</div><div id="sky-vs" class="v">0 fpm</div></div>
                </div>

                <div class="sky-btns">
                    <button id="sky-start" class="sky-btn go">Start tracking</button>
                    <button id="sky-stop" class="sky-btn">Stop / File</button>
                </div>
                <div id="sky-status" class="sky-status">Press Start when you begin the leg.</div>

                <div class="sky-pair">
                    <label>Pairing code (from the website)</label>
                    <div class="sky-pairrow">
                        <input id="sky-code" maxlength="8" placeholder="ABC123" spellcheck="false" />
                        <button id="sky-savecode" class="sky-btn sm">Save</button>
                    </div>
                </div>

                <textarea id="sky-out" class="sky-out" readonly placeholder="PIREP code appears here after you land"></textarea>
                <div class="sky-btns"><button id="sky-copy" class="sky-btn sm">Copy code</button></div>
                <div id="sky-submit" class="sky-status"></div>
            </div>
        </ingame-ui>
    </ingamepanel-custom>
</body>
</html>
